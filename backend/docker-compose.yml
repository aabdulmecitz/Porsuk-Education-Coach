version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: porsuk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-porsuk_db}
      - POSTGRES_USER=${DB_USER:-porsuk_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-porsuk_pass}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-porsuk_user} -d ${DB_NAME:-porsuk_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: porsuk_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - USE_SQLITE=False
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  media_volume:
